services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: livepulse-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env.prod
    networks:
      - livepulse

  realtime:
    build:
      context: ./apps/realtime
      dockerfile: Dockerfile
    container_name: livepulse-realtime
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    env_file:
      - .env.prod
    depends_on:
      - api
    networks:
      - livepulse

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_WS_URL: wss://rt.livepulse.dev
        NEXT_PUBLIC_API_URL: https://api.livepulse.dev
    container_name: livepulse-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.prod
    depends_on:
      - api
    networks:
      - livepulse

networks:
  livepulse:
    driver: bridge
