services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: livepulse-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env.prod
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - livepulse

  realtime:
    build:
      context: ./apps/realtime
      dockerfile: Dockerfile
    container_name: livepulse-realtime
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    env_file:
      - .env.prod
    depends_on:
      api:
        condition: service_healthy
    networks:
      - livepulse

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_WS_URL: wss://rt.livepulse.dev
    container_name: livepulse-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.prod
    depends_on:
      api:
        condition: service_healthy
    networks:
      - livepulse

networks:
  livepulse:
    driver: bridge
